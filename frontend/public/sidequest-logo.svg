<svg width="520" height="120" viewBox="0 0 520 120" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="sidequestLogoTitle sidequestLogoDesc">
  <title id="sidequestLogoTitle">SideQuest logo</title>
  <desc id="sidequestLogoDesc">A blue quest compass mark with the SideQuest wordmark.</desc>
  <defs>
    <linearGradient id="questMark" x1="28" y1="16" x2="92" y2="104" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7DD3FC"/>
      <stop offset="0.48" stop-color="#3B82F6"/>
      <stop offset="1" stop-color="#2563EB"/>
    </linearGradient>
    <linearGradient id="questGlow" x1="60" y1="7" x2="60" y2="113" gradientUnits="userSpaceOnUse">
      <stop stop-color="#93C5FD" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#2563EB" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="wordmark" x1="128" y1="32" x2="477" y2="94" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FAFC"/>
      <stop offset="0.64" stop-color="#DCEBFF"/>
      <stop offset="1" stop-color="#93C5FD"/>
    </linearGradient>
    <filter id="softBlueGlow" x="0" y="0" width="120" height="120" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feFlood flood-opacity="0" result="BackgroundImageFix"/>
      <feBlend mode="normal" in="SourceGraphic" in2="BackgroundImageFix" result="shape"/>
      <feGaussianBlur stdDeviation="8" result="effect1_foregroundBlur_1_2"/>
    </filter>
  </defs>

  <g filter="url(#softBlueGlow)" opacity="0.55">
    <path d="M60 9L75.6 44.4L111 60L75.6 75.6L60 111L44.4 75.6L9 60L44.4 44.4L60 9Z" fill="url(#questGlow)"/>
  </g>

  <g>
    <path d="M60 12L74.5 45.5L108 60L74.5 74.5L60 108L45.5 74.5L12 60L45.5 45.5L60 12Z" fill="#071326" stroke="#2A5FD7" stroke-width="3"/>
    <path d="M60 18L71.5 48.5L102 60L71.5 71.5L60 102L48.5 71.5L18 60L48.5 48.5L60 18Z" fill="url(#questMark)"/>
    <path d="M60 30L67.3 52.7L90 60L67.3 67.3L60 90L52.7 67.3L30 60L52.7 52.7L60 30Z" fill="#DBEAFE" opacity="0.94"/>
    <path d="M47 63.5C52.8 55.2 61.7 52.8 73 56.4" stroke="#0B1220" stroke-width="5.5" stroke-linecap="round"/>
    <path d="M47 63.5C52.8 55.2 61.7 52.8 73 56.4" stroke="#38BDF8" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M71.5 55.8L77.4 50.1" stroke="#38BDF8" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="47" cy="63.5" r="3.5" fill="#38BDF8" stroke="#0B1220" stroke-width="2"/>
    <circle cx="73" cy="56.4" r="3.5" fill="#38BDF8" stroke="#0B1220" stroke-width="2"/>
  </g>

  <g>
    <text x="128" y="73" fill="url(#wordmark)" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="44" font-weight="850" letter-spacing="7.5">SIDEQUEST</text>
    <path d="M130 88H468" stroke="#2563EB" stroke-width="2" stroke-linecap="round" opacity="0.35"/>
    <path d="M130 88H212" stroke="#60A5FA" stroke-width="2" stroke-linecap="round"/>
    <circle cx="226" cy="88" r="3" fill="#F59E0B"/>
