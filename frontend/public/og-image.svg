<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative circles -->
  <circle cx="950" cy="150" r="180" fill="#f59e0b" fill-opacity="0.05"/>
  <circle cx="1050" cy="500" r="120" fill="#f59e0b" fill-opacity="0.04"/>
  <circle cx="200" cy="550" r="100" fill="#ffffff" fill-opacity="0.02"/>

  <!-- Left amber accent bar -->
  <rect x="80" y="185" width="7" height="260" rx="3.5" fill="#f59e0b"/>

  <!-- PUSHUP -->
  <text x="112" y="300" font-family="-apple-system, BlinkMacSystemFont, Arial, sans-serif"
        font-size="108" font-weight="900" fill="#f8fafc" letter-spacing="-3">PUSHUP</text>

  <!-- DEBT in amber -->
  <text x="112" y="415" font-family="-apple-system, BlinkMacSystemFont, Arial, sans-serif"
        font-size="108" font-weight="900" fill="#f59e0b" letter-spacing="-3">DEBT</text>

  <!-- Tagline -->
  <text x="112" y="482" font-family="-apple-system, BlinkMacSystemFont, Arial, sans-serif"
        font-size="28" fill="#94a3b8" letter-spacing="0.5">Turn procrastination into gains</text>

  <!-- Feature pills -->
  <rect x="112" y="522" width="200" height="40" rx="20" fill="#1e3a4a"/>
  <text x="212" y="547" font-family="-apple-system, BlinkMacSystemFont, Arial, sans-serif"
        font-size="18" fill="#94a3b8" text-anchor="middle">📋 Task tracking</text>

  <rect x="328" y="522" width="220" height="40" rx="20" fill="#1e3a4a"/>
  <text x="438" y="547" font-family="-apple-system, BlinkMacSystemFont, Arial, sans-serif"
        font-size="18" fill="#94a3b8" text-anchor="middle">💪 Pushup payoff</text>

  <rect x="564" y="522" width="210" height="40" rx="20" fill="#1e3a4a"/>
  <text x="669" y="547" font-family="-apple-system, BlinkMacSystemFont, Arial, sans-serif"
        font-size="18" fill="#94a3b8" text-anchor="middle">🏆 Leaderboard</text>

  <!-- Domain -->
  <text x="1120" y="600" font-family="-apple-system, BlinkMacSystemFont, Arial, sans-serif"
        font-size="22" fill="#475569" text-anchor="end">pushupdebt.com</text>
</svg>
