<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" fill="none" role="img" aria-label="SideQuest — Turn your life into side quests">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#080F20"/>
      <stop offset="1" stop-color="#0E1B36"/>
    </linearGradient>
    <linearGradient id="questMark" x1="120" y1="170" x2="360" y2="490" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7DD3FC"/>
      <stop offset="0.48" stop-color="#3B82F6"/>
      <stop offset="1" stop-color="#2563EB"/>
    </linearGradient>
    <radialGradient id="halo" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(240 320) rotate(90) scale(220)">
      <stop stop-color="#2563EB" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#2563EB" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="wordmark" x1="470" y1="240" x2="1080" y2="330" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FAFC"/>
      <stop offset="0.64" stop-color="#DCEBFF"/>
      <stop offset="1" stop-color="#93C5FD"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative accents -->
  <circle cx="1010" cy="120" r="200" fill="#2563EB" fill-opacity="0.06"/>
  <circle cx="1090" cy="540" r="140" fill="#3B82F6" fill-opacity="0.05"/>

  <!-- Quest compass mark -->
  <g transform="translate(0 60)">
    <circle cx="240" cy="320" r="220" fill="url(#halo)"/>
    <path d="M240 150L283.9 246.1L380 290L283.9 333.9L240 430L196.1 333.9L100 290L196.1 246.1L240 150Z" fill="#0A1730" stroke="#2A5FD7" stroke-width="10"/>
    <path d="M240 174L274.3 261.7L362 296L274.3 330.3L240 418L205.7 330.3L118 296L205.7 261.7L240 174Z" fill="url(#questMark)"/>
    <path d="M240 214L262 270L318 292L262 314L240 370L218 314L162 292L218 270L240 214Z" fill="#DBEAFE" opacity="0.95"/>
    <path d="M198 300C218 270 247 262 285 276" stroke="#071326" stroke-width="20" stroke-linecap="round"/>
    <path d="M198 300C218 270 247 262 285 276" stroke="#38BDF8" stroke-width="9" stroke-linecap="round"/>
    <path d="M281 274L301 254" stroke="#38BDF8" stroke-width="9" stroke-linecap="round"/>
    <circle cx="198" cy="300" r="13" fill="#38BDF8" stroke="#071326" stroke-width="7"/>
    <circle cx="285" cy="276" r="13" fill="#38BDF8" stroke="#071326" stroke-width="7"/>
  </g>

  <!-- Wordmark -->
  <text x="470" y="312" fill="url(#wordmark)" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif" font-size="104" font-weight="900" letter-spacing="6">SIDEQUEST</text>

  <!-- Underline accent with quest dots -->
  <path d="M474 350H1052" stroke="#2563EB" stroke-width="3" stroke-linecap="round" opacity="0.35"/>
  <path d="M474 350H620" stroke="#60A5FA" stroke-width="3" stroke-linecap="round"/>
  <circle cx="648" cy="350" r="5" fill="#F59E0B"/>
  <circle cx="672" cy="350" r="5" fill="#22C55E"/>
  <circle cx="696" cy="350" r="5" fill="#EF4444"/>

  <!-- Tagline -->
  <text x="474" y="408" fill="#94A3B8" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif" font-size="32" letter-spacing="0.5">Turn your life into side quests.</text>

  <!-- Feature pills -->
  <g font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif" font-size="20" font-weight="600">
    <rect x="474" y="452" width="210" height="46" rx="23" fill="#0D1F38" stroke="#2563EB" stroke-opacity="0.35"/>
    <text x="579" y="481" fill="#CBD5E1" text-anchor="middle">Quest tracking</text>

    <rect x="700" y="452" width="200" height="46" rx="23" fill="#0D1F38" stroke="#2563EB" stroke-opacity="0.35"/>
    <text x="800" y="481" fill="#CBD5E1" text-anchor="middle">Debt payoff</text>

    <rect x="916" y="452" width="200" height="46" rx="23" fill="#0D1F38" stroke="#2563EB" stroke-opacity="0.35"/>
    <text x="1016" y="481" fill="#CBD5E1" text-anchor="middle">Leaderboard</text>
  </g>
</svg>
